networks:
  # Owned by this stack. App stacks reference it as external: true.
  # Created automatically when this stack starts.
  traefik-public:
    name: traefik-public
    driver: bridge

  # Isolated network between Traefik and the socket proxy only.
  # Never connected to traefik-public — app containers cannot reach it.
  socket-proxy:
    name: socket-proxy
    driver: bridge

services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.1
    container_name: socket-proxy
    restart: unless-stopped
    networks:
      - socket-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Grant only what Traefik needs to discover containers.
      # Everything else is denied by default.
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 1
      TASKS: 1
      # Explicitly deny write access
      POST: 0
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /run
      - /tmp

  traefik:
    image: traefik:v3.6.1
    container_name: traefik
    restart: unless-stopped
    depends_on:
      - socket-proxy
    command:
      - --configFile=/traefik.yml
    networks:
      - traefik-public
      - socket-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik.yml:/traefik.yml:ro
      - ./acme.json:/letsencrypt/acme.json
    env_file:
      - .env
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
